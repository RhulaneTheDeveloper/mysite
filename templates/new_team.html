<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register New Team</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    :root {
      --primary-color: #007bff;
      --primary-dark: #0056b3;
      --background: #f4f6f8;
      --card-bg: #ffffff;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --nav-link: #333;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(to right, #364f5a, #0977a7);
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--nav-bg);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      font-size: 1.5em;
      color: #007bff;
    }

    nav ul {
      list-style: none;
      display: flex;
      padding: 0;
      margin: 0;
      gap: 20px;
    }

    nav ul li {
      display: inline;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--nav-link);
      font-weight: bold;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: var(--primary-color);
    }

    main {
      flex: 1;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #fff;
      margin-bottom: 20px;
    }

    .form-card {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }

    .form-grid {
      display: grid;
      gap: 20px;
    }

    .form-group {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 12px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      transition: border 0.3s ease;
    }

    .form-group input:focus {
      border-color: var(--primary-color);
      outline: none;
    }

    .form-group label {
      position: absolute;
      left: 12px;
      top: 12px;
      background: white;
      padding: 0 5px;
      color: #888;
      transition: 0.2s ease all;
      pointer-events: none;
    }

    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: -8px;
      left: 10px;
      font-size: 12px;
      color: var(--primary-color);
    }

    .map-container {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 20px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: var(--primary-dark);
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      nav ul {
        flex-direction: column;
        gap: 10px;
        padding-top: 10px;
      }

      .form-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>CIRS</h1>
    <nav>
      <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/viewReports.html">View Reports</a></li>
        <li><a href="/logout.html">Logout</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Register New Team</h2>
    <form class="form-card" method="POST" action="{{ url_for('reg_team') }}">
      <div class="form-grid">
        <div class="form-group">
          <input type="text" name="team_name" id="team_name" placeholder=" " required />
          <label for="team_name">Team Name</label>
        </div>

        <div class="form-group">
          <input type="text" name="maintenance_personnel_id" id="manager" placeholder=" " required />
          <label for="manager">Manager Contact Number</label>
        </div>
      </div>

      <input type="hidden" id="latitude" name="latitude" />
      <input type="hidden" id="longitude" name="longitude" />

      <div class="map-container">
        <div id="map"></div>
      </div>

      <button type="submit">Submit Team Info</button>
    </form>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);

    let marker;

    function updateInputs(lat, lon) {
      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lon;
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        map.setView([lat, lon], 14);
        marker = L.marker([lat, lon], { draggable: true }).addTo(map)
          .bindPopup('Drag to select location').openPopup();
        updateInputs(lat, lon);
        marker.on('dragend', (e) => {
          const pos = e.target.getLatLng();
          updateInputs(pos.lat, pos.lng);
        });
      }, () => {
        alert('Geolocation permission denied or unavailable.');
      });
    } else {
      alert('Geolocation is not supported by your browser.');
    }
  </script>
</body>
</html>
