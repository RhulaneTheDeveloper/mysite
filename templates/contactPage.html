<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CIRS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, rgb(54, 79, 90), rgb(9, 119, 167));
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #007bff;
        }

        .container {
            flex: 1;
            padding: 40px 20px;
        }

        .contact-form {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .contact-form:hover {
            background: linear-gradient(to right, rgb(54, 79, 90), rgb(9, 119, 167));
            box-shadow: 0 4px 12px rgba(0, 0, 139, 0.5);
            color: white;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        footer {
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-top: auto;
        }

        footer nav a {
            text-decoration: none;
            margin: 0 10px;
        }

    </style>
</head>
<body>
    <header>
        <h1>CIRS</h1>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/signInPage.html" class="activeA">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="contact-form">
            <h2>Contact Us</h2>
            <p>We would love to hear from you! Please fill out the form below and we will get in touch as soon as possible.</p>
            <form action="/submitContactForm" method="POST">
                <input
                    type="text"
                    name="name"
                    placeholder="Your Name"
                    required
                    pattern="[A-Za-z\s]+"
                    title="Name should only contain letters and spaces.">
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Ready to transform your community’s infrastructure? Join CIRS today.</p>
        <a href="registerPage.html">Sign Up Now</a>
        <nav>
            <a href="/aboutUs.html">About</a> | <a href="/contactUs.html">Contact</a>
        </nav>
    </footer>
</body>
</html>
